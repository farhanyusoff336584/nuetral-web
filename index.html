<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Name Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #fff;
      margin: 0 auto 24px;
      user-select: none;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #718096;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    /* Display view */
    #display-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #name-display {
      font-size: 2rem;
      font-weight: 700;
      color: #2d3748;
    }

    .btn {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #667eea;
      color: #fff;
    }

    .btn-primary:hover {
      background: #5a67d8;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    /* Edit view */
    #edit-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #name-input {
      font-size: 1.4rem;
      font-weight: 600;
      color: #2d3748;
      border: 2px solid #667eea;
      border-radius: 8px;
      padding: 8px 16px;
      text-align: center;
      width: 100%;
      outline: none;
      transition: box-shadow 0.2s ease;
    }

    #name-input:focus {
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);
    }

    .btn-group {
      display: flex;
      gap: 12px;
    }

    .btn-success {
      background: #48bb78;
      color: #fff;
    }

    .btn-success:hover {
      background: #38a169;
      box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #4a5568;
    }

    .btn-secondary:hover {
      background: #cbd5e0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar" id="avatar-initials">FY</div>
    <h1>Welcome!</h1>
    <p class="subtitle">This is your personal name page.</p>

    <!-- Display view -->
    <div id="display-view">
      <span id="name-display">Farhan Yusoff</span>
      <button class="btn btn-primary" onclick="startEdit()">✏️ Edit Name</button>
    </div>

    <!-- Edit view -->
    <div id="edit-view">
      <input type="text" id="name-input" maxlength="60" placeholder="Enter your name" />
      <div class="btn-group">
        <button class="btn btn-success" onclick="saveName()">💾 Save</button>
        <button class="btn btn-secondary" onclick="cancelEdit()">✕ Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const displayView = document.getElementById('display-view');
    const editView    = document.getElementById('edit-view');
    const nameDisplay = document.getElementById('name-display');
    const nameInput   = document.getElementById('name-input');
    const avatarEl    = document.getElementById('avatar-initials');

    function getInitials(name) {
      return name
        .trim()
        .split(/\s+/)
        .filter(w => w.length > 0)
        .map(w => w[0].toUpperCase())
        .slice(0, 2)
        .join('');
    }

    function updateAvatar(name) {
      avatarEl.textContent = getInitials(name) || '?';
    }

    function startEdit() {
      nameInput.value = nameDisplay.textContent;
      displayView.style.display = 'none';
      editView.style.display    = 'flex';
      nameInput.focus();
      nameInput.select();
    }

    function saveName() {
      const newName = nameInput.value.trim();
      if (!newName) {
        nameInput.style.borderColor = '#fc8181';
        nameInput.focus();
        return;
      }
      nameInput.style.borderColor = '#667eea';
      nameDisplay.textContent = newName;
      updateAvatar(newName);
      editView.style.display    = 'none';
      displayView.style.display = 'flex';
    }

    function cancelEdit() {
      nameInput.style.borderColor = '#667eea';
      editView.style.display    = 'none';
      displayView.style.display = 'flex';
    }

    // Allow Enter to save, Escape to cancel
    nameInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter')  saveName();
      if (e.key === 'Escape') cancelEdit();
    });

    // Initialize avatar
    updateAvatar(nameDisplay.textContent);
  </script>
</body>
</html>
